name: Deploy Web

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg VITE_API_URL="${{ vars.VITE_API_URL }}" \
            -t ${{ vars.DOCKERHUB_USERNAME }}/stock-web:latest \
            ./

      - name: Push Docker image
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/stock-web:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/stock-web:latest

            docker stop stock-web 2>/dev/null || true
            docker rm stock-web 2>/dev/null || true

            docker run -d \
              --name stock-web \
              --network stock-network \
              --restart unless-stopped \
              -p 127.0.0.1:${{ vars.WEB_PORT }}:80 \
              ${{ vars.DOCKERHUB_USERNAME }}/stock-web:latest

            echo "✅ Deployment Web completed!"
